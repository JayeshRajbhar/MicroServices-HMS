spring.config.import=optional:file:api-gateway/.env[.properties],optional:file:.env[.properties]
spring.application.name=api-gateway
server.port=${GATEWAY_PORT:8080}

eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka

jwt.secret=${JWT_SECRET:local-dev-jwt-secret-2026-microservices-256-bit-key}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:lb://auth-service}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=patient-service
spring.cloud.gateway.server.webflux.routes[1].uri=${PATIENT_SERVICE_URL:lb://patient}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/patients/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[2].id=doctor-service
spring.cloud.gateway.server.webflux.routes[2].uri=${DOCTOR_SERVICE_URL:lb://doctor}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/doctors/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[3].id=staff-service
spring.cloud.gateway.server.webflux.routes[3].uri=${STAFF_SERVICE_URL:lb://staff}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/staff/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[4].id=room-service
spring.cloud.gateway.server.webflux.routes[4].uri=${STAFF_SERVICE_URL:lb://staff}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/rooms/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].exposed-headers=Authorization,Content-Type

management.endpoints.web.exposure.include=health,info
